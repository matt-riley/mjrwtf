[tools]
go = "1.26.5"
golangci-lint = "latest"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.build]
description = "Build"
run = "go build ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"
